# ─────────────────────────────────────────────
# Binning
# ─────────────────────────────────────────────
binning:
  reco:
    mtt_edges: [300, 375, 450, 525, 600, 675, 750, 825, 900, 975, 1050, 1125, 1200]  
    unit: GeV

  gen:
    mtt_edges: [300, 450, 600, 750, 900, 1050, 1200]    
    unit: GeV

# ─────────────────────────────────────────────
# Output histogram names
# ─────────────────────────────────────────────
histograms:
  reco:
    name_pattern: "h_reco_{dataset}"           # {dataset} is substituted at runtime
    title_pattern: "{dataset} Reco Unrolled;Bin;Events"
    file_pattern:  "unrolled_reco_{dataset}"   # output PNG/PDF base name

  gen:
    name:  "h_gen_ttbar_SemiLeptonic"
    title: "ttbar_SemiLeptonic Gen Unrolled;Bin;Events"
    file:  "unrolled_gen_ttbar_SemiLeptonic"

  root_output: "unrolled_histograms.root"      # single ROOT file per era

