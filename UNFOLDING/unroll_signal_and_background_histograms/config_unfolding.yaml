# ─────────────────────────────────────────────
# Physics parameters
# ─────────────────────────────────────────────
physics:
  Y_0: 1.2                    # rapidity threshold for N+/N- definition
  pgof_cut: 0.2               # kinematic fitter quality-of-fit threshold (exp(-chi2/2))

# ─────────────────────────────────────────────
# Era-specific settings
# ─────────────────────────────────────────────
eras:
  2016preVFP:
    lumi: 19520.0             # pb-1
    outdir: /home/irfan/sanskar/ANALYSIS/UNFOLDING/unroll_signal_and_background_histograms/results_unrolled_histograms/2016preVFP
    reco_dir: /home/irfan/sanskar/ANALYSIS/RECO/minimizer-scripts/results_top_lep_top_had/
    gen_dir:  /home/irfan/sanskar/ANALYSIS/RECO/minimizer-scripts/
    file_suffix: _reco_variables_for_minimisation_for_2016preVFP_fit_2016preVFP.h5
