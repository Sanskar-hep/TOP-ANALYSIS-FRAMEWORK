# ─────────────────────────────────────────────
# Plot styling
# ─────────────────────────────────────────────
plotting:
  canvas_height: 700
  canvas_width_per_bin: 100
  canvas_width_min: 1400
  bar_fill_color: 38         # ROOT kAzure+7
  bar_line_color: 1          # ROOT kBlack
  bar_line_width: 2
  divider_line_color: 2      # ROOT kRed
  divider_line_style: 2      # dashed
  divider_line_width: 2
  y_axis_title: "Events"
  y_scale_factor: 1.20       # headroom above max bin
  label_size: 0.038
  label_option: "v"          # vertical x-axis labels
  save_formats:
    - pdf
    - png