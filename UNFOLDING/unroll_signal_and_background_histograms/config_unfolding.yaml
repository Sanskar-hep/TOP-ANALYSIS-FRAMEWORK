    gen_dir:  /home/irfan/sanskar/ANALYSIS/RECO/minimizer-scripts/
    file_suffix: _reco_variables_for_minimisation_for_2017_fit_2017.h5
    gen_suffix:  _reco_variables_for_minimisation_for_2017.h5

  2018:
